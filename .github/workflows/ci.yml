name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install client dependencies
        run: npm ci

      - name: Install server dependencies
        run: npm --prefix server ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Smoke test
        run: npm run test:smoke
